      <text x="28" y="99" fill="#253633" font-size="17" font-weight="700">YANGYANG</text>
      <text x="28" y="132" fill="#213330" font-size="20">The resonance is thicker here.</text>
      <text x="28" y="170" fill="#416660" font-size="20">这里的共鸣更浓，像空气记得什么。</text>
