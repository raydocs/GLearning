<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">GLearning</title>
  <desc id="desc">English and Chinese game dialogue is paired into a source-aware reader with audio, saving, and review.</desc>
  <rect width="1200" height="420" rx="28" fill="#071D22"/>
  <path d="M0 334 C230 280 350 420 610 338 C835 267 978 347 1200 295 V420 H0Z" fill="#0D3035"/>
